services:
  - type: web
    name: chinilkin
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py create_admin
    startCommand: gunicorn chinilkin.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: chinilkin.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: chinilkin.onrender.com,localhost,127.0.0.1
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@chinilkin.com
      - key: ADMIN_PASSWORD
        value: Admin123456!
      - key: DATABASE_URL
        fromDatabase:
          name: chinilkin-db
          property: connectionString

databases:
  - name: chinilkin-db
    databaseName: chinilkin
    user: chinilkin
